<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GPT Neural Radio Player</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='6' fill='%2398A3AF'/><circle cx='16' cy='16' r='12' fill='none' stroke='%2398A3AF' stroke-opacity='0.3' stroke-width='1'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/player.css?v=20260514-player-window-v1">
</head>
<body>
<main id="radio-player">
  <section id="now-panel" aria-label="current playback">
    <div id="player-status">
      <span id="player-state">IDLE</span>
      <span id="player-source">LOCAL SIGNAL</span>
    </div>

    <div id="now-core">
      <div id="cover-frame">
        <div id="player-cover">♪</div>
      </div>

      <div id="track-block">
        <div id="player-song">—</div>
        <div id="player-artist"></div>
        <div id="lyric-ticker"></div>
      </div>
    </div>

    <canvas id="wave-canvas" width="960" height="180" aria-hidden="true"></canvas>

    <div id="transport">
      <button class="ctrl" id="btn-prev" type="button" aria-label="previous">⟨⟨</button>
      <button class="ctrl main" id="btn-play" type="button" aria-label="play">▶</button>
      <button class="ctrl" id="btn-next" type="button" aria-label="next">⟩⟩</button>
      <div id="progress-block">
        <div id="progress-wrap"><div id="progress-bar"></div></div>
        <div id="player-time">0:00 / 0:00</div>
      </div>
    </div>
  </section>

  <aside id="queue-panel" aria-label="program queue">
    <div id="queue-top">
      <div>
        <div id="queue-header">节目队列</div>
        <div id="queue-status">NEXT 10</div>
      </div>
      <button id="focus-main" type="button">NOW</button>
    </div>
    <div id="queue-items"><div class="qi-empty">AWAITING SIGNAL…</div></div>
  </aside>

  <section id="dj-panel" aria-label="dj conversation">
    <div id="mode-switch" role="group" aria-label="input mode">
      <button id="mode-song" class="mode-pill active" type="button" data-mode="song">点歌 · 会切歌</button>
      <button id="mode-chat" class="mode-pill" type="button" data-mode="chat">聊天 · 不动播放</button>
    </div>
    <div id="mini-messages" aria-live="polite"></div>
    <div id="input-row">
      <input id="input" type="text" autocomplete="off" spellcheck="false" placeholder="说你想听什么_">
      <button id="send-btn" type="button">SEND</button>
    </div>
  </section>
</main>

<audio id="audio"></audio>
<script type="module" src="/js/player-app.js?v=20260514-player-window-v1"></script>
</body>
</html>
